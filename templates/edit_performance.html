<!DOCTYPE html>
<html>
<head>
    <title>Edit Match Performance</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background-color: #1a1a2e; color: white; padding: 40px; }
        .container { background: #16213e; padding: 30px; border-radius: 15px; width: 450px; margin: auto; }
        label { display: block; margin-top: 15px; font-weight: bold; }
        input { width: 100%; padding: 10px; margin-top: 5px; border-radius: 8px; border: none; box-sizing: border-box; }
        .btn-group { margin-top: 25px; display: flex; align-items: center; gap: 15px; }
        .save-btn { background: #4e89ae; color: white; padding: 12px 25px; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; }
        .cancel-btn { color: #888; text-decoration: none; }
        
        /* Layout for Fours and Sixes */
        .flex-row { display: flex; gap: 15px; margin-top: 5px; }
        .flex-item { flex: 1; }
    </style>
</head>
<body>

<div class="container">
    <h2>Edit Match against {{ p.opponent }}</h2>
    
    <input type="hidden" id="player_role" value="{{ p.role }}">

    <form method="POST">
        <label>Opponent:</label>
        <input type="text" name="opponent" value="{{ p.opponent }}">

        <div id="batting-section">
            <label>Runs Scored (Batting):</label>
            <input type="number" name="runs" value="{{ p.runs }}">

            <label>Balls Faced:</label>
            <input type="number" name="balls" value="{{ p.balls }}" min="0">

            <div class="flex-row">
                <div class="flex-item">
                    <label>Fours (4s):</label>
                    <input type="number" name="fours" value="{{ p.fours }}" min="0">
                </div>
                <div class="flex-item">
                    <label>Sixes (6s):</label>
                    <input type="number" name="sixes" value="{{ p.sixes }}" min="0">
                </div>
            </div>
        </div>

        <div id="bowling-section">
            <label>Wickets Taken:</label>
            <input type="number" name="wickets" value="{{ p.wickets }}">

            <label>Runs Conceded (Bowling):</label>
            <input type="number" name="runs_conceded" value="{{ p.runs_conceded }}">

            <label>Overs Bowled (e.g. 4.0):</label>
            <input type="number" step="0.1" name="overs" value="{{ p.overs }}" oninput="validateOvers(this)">
            <small style="color: #888; font-size: 11px;">Max .5 balls per over (e.g., 0.6 becomes 1.0)</small>
        </div>

        <div class="btn-group">
            <button type="submit" class="save-btn">Update Stats</button>
            <a href="/admin" class="cancel-btn">Cancel</a>
        </div>
    </form>
</div>

<script>
    function validateOvers(input) {
        const val = input.value.toString();
        if (val.includes('.')) {
            const parts = val.split('.');
            const balls = parseInt(parts[1]);
            if (balls >= 6) {
                // Correct 1.7 -> 2.1, 0.9 -> 1.3, etc.
                const correctedOvers = Math.floor(parseFloat(val)) + 1 + (balls - 6) / 10;
                input.value = correctedOvers.toFixed(1);
            }
        }
    }

    function hideFields() {
        const role = document.getElementById('player_role').value;
        const batting = document.getElementById('batting-section');
        const bowling = document.getElementById('bowling-section');

        // Logic to hide sections based on role
        if (role === "Batter") {
            bowling.style.display = 'none';
            batting.style.display = 'block';
        } else if (role === "Bowler") {
            batting.style.display = 'none';
            bowling.style.display = 'block';
        } else {
            // All Rounder: Keep both visible
            batting.style.display = 'block';
            bowling.style.display = 'block';
        }
    }
    
    // Run the filter immediately on page load
    window.onload = hideFields;
</script>

</body>
</html>

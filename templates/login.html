<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Login - CricVision</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #0f172a; color: white; height: 100vh; display: flex; align-items: center; justify-content: center; }
        .login-card { background-color: #1e293b; padding: 2rem; border-radius: 12px; border: 1px solid #334155; width: 100%; max-width: 400px; box-shadow: 0 10px 25px rgba(0,0,0,0.5); }
        .btn-primary { background-color: #3b82f6; border: none; width: 100%; padding: 10px; font-weight: bold; }
        .btn-primary:hover { background-color: #2563eb; }
        .form-control { background-color: #0f172a; border: 1px solid #334155; color: white; }
        .form-control:focus { background-color: #0f172a; color: white; border-color: #3b82f6; box-shadow: none; }
    </style>
</head>
<body>
    <div class="login-card">
        <h3 class="text-center mb-4">Admin Portal</h3>
        <form action="/login" method="POST">
            <div class="mb-3">
                <label class="form-label">Password</label>
                <input type="password" name="password" class="form-control" placeholder="Enter Admin Password" required autofocus>
            </div>
            <button type="submit" class="btn btn-primary">Login</button>
            <a href="/" class="d-block text-center mt-3 text-secondary text-decoration-none small">Back to Home</a>
        </form>
    </div>
</body>
</html>

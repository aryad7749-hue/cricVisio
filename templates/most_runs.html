<!DOCTYPE html>
<html>
<head>
    <title>Most Runs</title>

    <style>
        body {
            margin: 0;
            font-family: 'Segoe UI', sans-serif;
            background: linear-gradient(135deg, #0ea5e9, #1e3a8a);
            color: white;
        }

        /* NAVBAR */
        .navbar {
            background: rgba(0,0,0,0.7);
            padding: 15px 30px;
            font-size: 22px;
            font-weight: bold;
            border-bottom: 2px solid #38bdf8;
        }

        /* TITLE */
        h1 {
            text-align: center;
            margin-top: 30px;
            font-size: 40px;
            letter-spacing: 1px;
            text-shadow: 0px 0px 15px rgba(255,255,255,0.6);
        }

        /* CONTAINER */
        .container {
            max-width: 600px;
            margin: 40px auto;
        }

        /* CARD LIST */
        .card {
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: rgba(255,255,255,0.1);
            margin: 15px 0;
            padding: 18px 25px;
            border-radius: 15px;
            backdrop-filter: blur(10px);
            transition: 0.3s;
            box-shadow: 0px 5px 15px rgba(0,0,0,0.5);
        }

        .card:hover {
            transform: scale(1.03);
            background: rgba(56, 189, 248, 0.6);
            box-shadow: 0px 10px 25px rgba(14,165,233,0.8);
        }

        /* RANK */
        .rank {
            font-size: 22px;
            font-weight: bold;
            color: #e0f2fe;
        }

        /* PLAYER */
        .name {
            font-size: 20px;
            font-weight: 500;
        }

        /* RUNS */
        .runs {
            font-size: 20px;
            font-weight: bold;
            color: #bae6fd;
        }

    </style>
</head>

<body>

<div class="navbar">
    🏏 Cricket Analytics Dashboard
</div>

<h1>🔥 Most Runs Leaderboard</h1>

<div class="container">

{% for p in data %}
    <div class="card">
        <div class="rank">#{{ loop.index }}</div>
        <div class="name">{{ p['name'] }}</div>
        <div class="runs">{{ p['total_runs'] }} runs</div>
    </div>
{% endfor %}

</div>

</body>
</html>
